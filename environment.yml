# Marketplace Analytics Platform — conda environment

name: Marketplace-Analytics-Platform
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas=3.0.3
  - numpy=2.4.6
  - matplotlib=3.11.0
  - seaborn=0.13.2
  - scipy=1.17.1
  - scikit-learn=1.9.0
  - statsmodels=0.14.6
  - jupyterlab=4.6.1
  - psycopg2=2.9.12
  - sqlalchemy=2.0.51
  - kaggle=2.2.3

# Create and activate conda environment
#   conda env create -f environment.yml
#   conda activate Marketplace-Analytics-Platform

# Update after changing this file (if any updates are made to this file)
#   conda env update -f environment.yml --prune
#